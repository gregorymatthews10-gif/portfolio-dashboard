name: Refresh portfolio dashboard

on:
  schedule:
    # UTC times. GitHub cron does NOT adjust for daylight saving.
    # 13:00 UTC = 9 AM EDT, 21:00 UTC = 5 PM EDT (summer / now).
    # On Nov 2, 2026 (EST returns), change to 14:00 and 22:00 to stay at 9 & 5 ET.
    - cron: '0 13 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Refresh prices in holdings.json
        run: python update_prices.py
      - name: Commit and push
        run: |
          git config user.name  "portfolio-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add holdings.json
          git diff --staged --quiet || git commit -m "Auto-refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
