name: Refresh portfolio dashboard

on:
  schedule:
    # Times are UTC. GitHub cron does NOT adjust for daylight saving.
    # 13:00 UTC = 9:00 AM EDT, 21:00 UTC = 5:00 PM EDT (summer / now).
    # When EST returns (Nov 2, 2026), bump both to 14:00 and 22:00 to stay at 9 & 5 ET.
    - cron: '0 13 * * 1-5'   # 9 AM ET, Mon-Fri
    - cron: '0 21 * * 1-5'   # 5 PM ET, Mon-Fri
  workflow_dispatch:          # lets you trigger a refresh by hand from the Actions tab

permissions:
  contents: write             # required so the job can push the refreshed data back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update live prices (yfinance)
        run: python update_prices.py

      - name: Recompute analytics + append NAV snapshot
        run: python compute_analytics.py

      - name: Commit and push refreshed data
        run: |
          git config user.name  "portfolio-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
